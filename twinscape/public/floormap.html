<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twinscape</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='8' fill='%232563eb'/><path d='M6 17 H10.5 L13 11 L16.5 23 L19.5 15 H22' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/><circle cx='24.3' cy='15' r='1.9' fill='white'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/pulse.css">
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("pulse-theme") || "dark");</script>
</head>
<body data-view="2d">

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <defs><linearGradient id="pmk" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs>
          <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#pmk)"/>
          <path d="M6 17 H10.5 L13 11 L16.5 23 L19.5 15 H22" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
          <circle class="brand-live" cx="24.3" cy="15" r="1.9" fill="#fff"/>
        </svg>
      </span>
      Twin<b>scape</b>
    </div>
    <div class="loc-nav" id="locNav"></div>
    <span class="tb-spacer"></span>
    <div class="tb-search">
      <input id="searchBox" type="text" placeholder="Cari device / IP…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <span class="tb-item" id="lastUpdate">Menyambung…</span>
    <span class="tb-item"><span class="conn-dot" id="connDot"></span><span id="connLabel">Offline</span></span>
    <button class="icon-btn" id="shareBtn" title="Salin link monitor (read-only)">🔗</button>
    <button class="icon-btn" id="settingsBtn" title="Pengaturan">⚙</button>
    <button class="icon-btn" id="logoutBtn" title="Keluar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <!-- toggle 3D/2D melayang di kanan-atas (di bawah header) -->
  <div class="view-toggle">
    <div class="seg">
      <button id="t3d">3D</button>
      <button id="t2d" class="active">2D</button>
    </div>
  </div>

  <!-- ===== 2D STAGE ===== -->
  <div id="stage" class="map2d">
    <svg id="floormap" viewBox="0 0 1120 780" preserveAspectRatio="xMidYMid meet">
      <defs>
        <pattern id="dotgrid" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle class="bp-grid-dot" cx="1" cy="1" r="1"/>
        </pattern>
      </defs>
      <g id="viewport">
        <rect x="0" y="0" width="1120" height="780" fill="url(#dotgrid)"/>
        <g id="floorplan"></g>
        <g id="markers"></g>
      </g>
    </svg>
    <div class="fm-tooltip" id="tooltip"></div>
    <div id="msg" style="position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--text-dim);font-size:14px;line-height:1.7;background:var(--panel);backdrop-filter:blur(4px)"></div>
  </div>

  <!-- ===== LEFT STAT PANEL (sama dgn 3D) ===== -->
  <div class="statpanel">
    <div class="sp-head">
      <span class="sp-dot" id="spDot"></span>
      <div class="sp-headtext">
        <div class="sp-name" id="sceneInfo">Monitoring</div>
        <div class="sp-sub" id="locSub">Menyambung…</div>
      </div>
    </div>
    <div class="sp-hero">
      <div class="sp-hero-val"><b id="upCount">0</b><span>/ <i id="totalDevices">0</i></span></div>
      <div class="sp-hero-lbl">device online</div>
    </div>
    <div class="sp-health">
      <div class="sp-health-top"><span>Health</span><b id="healthScore">100%</b></div>
      <div class="sp-bar"><i id="healthBar"></i></div>
    </div>
    <div class="sp-chips">
      <div class="sp-chip down"><b id="downCount">0</b><span>Down</span></div>
      <div class="sp-chip unknown"><b id="unknownCount">0</b><span>No data</span></div>
    </div>
    <div class="sp-filter" id="statusFilter">
      <button data-f="all" class="active">Semua</button>
      <button data-f="up">Up</button>
      <button data-f="down">Down</button>
    </div>
    <div class="sp-zones" id="zonePanel" style="display:none"></div>
  </div>

  <!-- ===== LEGEND ===== -->
  <div class="fm-legend">
    <div class="lg-title">Status</div>
    <div class="lg-row"><span class="lg-dot" style="background:var(--up)"></span> Up / Online</div>
    <div class="lg-row"><span class="lg-dot" style="background:var(--down)"></span> Down / Offline</div>
    <div class="lg-row"><span class="lg-dot" style="background:var(--unknown)"></span> Belum terpetakan</div>
    <div class="lg-title" style="margin-top:10px">Severity (ring)</div>
    <div class="lg-row"><span class="lg-ring" style="border-color:var(--down)"></span> Critical</div>
    <div class="lg-row"><span class="lg-ring" style="border-color:var(--high)"></span> High</div>
    <div class="lg-row"><span class="lg-ring" style="border-color:var(--accent)"></span> Medium</div>
    <div class="lg-row"><span class="lg-ring" style="border-color:var(--unknown)"></span> Low</div>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div class="ctrls">
    <button class="icon-btn" id="zoomOut" title="Zoom out">−</button>
    <button class="icon-btn" id="zoomIn" title="Zoom in">+</button>
    <button class="icon-btn" id="zoomReset" title="Reset view">⟳</button>
    <button class="icon-btn" id="btnExport" title="Export SVG statik">⭳</button>
  </div>

  <!-- ===== DETAIL PANEL ===== -->
  <aside class="fm-detail" id="detailPanel"><div id="detailContent"></div></aside>

  <script src="/js/pulse-chrome.js"></script>
  <script src="/js/floormap.js"></script>
</body>
</html>
