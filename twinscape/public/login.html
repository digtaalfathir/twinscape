<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Twinscape</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='8' fill='%232563eb'/><path d='M6 17 H10.5 L13 11 L16.5 23 L19.5 15 H22' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/><circle cx='24.3' cy='15' r='1.9' fill='white'/></svg>">
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("pulse-theme") || "dark");</script>
  <style>
    :root,:root[data-theme="dark"]{--bg:#0a0d16;--panel:#131926;--border:rgba(255,255,255,.09);--hover:rgba(255,255,255,.05);
      --text:#e6ecf6;--dim:#8b9ab4;--bright:#f9fbff;--accent:#3b82f6;--down:#ef4444}
    :root[data-theme="light"]{--bg:#eef2f8;--panel:#fff;--border:rgba(15,23,42,.1);--hover:rgba(15,23,42,.04);
      --text:#233047;--dim:#647084;--bright:#0f172a;--accent:#2563eb;--down:#dc2626}
    *{margin:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
      font-family:'Inter',system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);
      background-image:radial-gradient(120% 80% at 50% -10%,rgba(59,130,246,.14) 0%,transparent 55%)}
    .card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--border);border-radius:18px;
      padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
    .brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
    .brand svg{filter:drop-shadow(0 3px 8px rgba(37,99,235,.4))}
    .brand .w{font-size:21px;font-weight:700;letter-spacing:-.01em;color:var(--bright)}
    .brand .w b{color:var(--accent);font-weight:800}
    .sub{text-align:center;font-size:13px;color:var(--dim);margin-bottom:24px}
    label{display:block;font-size:12px;font-weight:600;color:var(--dim);margin:0 0 6px 2px}
    .field{margin-bottom:15px}
    input{width:100%;background:var(--hover);border:1px solid var(--border);border-radius:10px;color:var(--bright);
      font:500 14px inherit;padding:11px 13px;outline:none;transition:border-color .15s}
    input:focus{border-color:var(--accent)}
    button{width:100%;margin-top:6px;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;
      font:700 14px inherit;cursor:pointer;transition:filter .15s}
    button:hover{filter:brightness(1.08)}
    button:disabled{opacity:.6;cursor:default}
    .err{min-height:18px;margin-top:12px;text-align:center;font-size:12.5px;font-weight:600;color:var(--down)}
    .beat{transform-box:fill-box;transform-origin:center;animation:beat 1.8s ease-in-out infinite}
    @keyframes beat{0%,100%{opacity:.4}50%{opacity:1}}
    @media (prefers-reduced-motion:reduce){.beat{animation:none}}
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand">
      <svg viewBox="0 0 32 32" width="40" height="40" aria-hidden="true">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs>
        <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#g)"/>
        <path d="M6 17 H10.5 L13 11 L16.5 23 L19.5 15 H22" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="beat" cx="24.3" cy="15" r="1.9" fill="#fff"/>
      </svg>
      <span class="w">Twin<b>scape</b></span>
    </div>
    <div class="sub">Masuk untuk mengakses monitoring</div>

    <div class="field">
      <label for="u">Username</label>
      <input id="u" name="username" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button id="btn" type="submit">Masuk</button>
    <div class="err" id="err"></div>
  </form>

  <script>
    const form = document.getElementById("loginForm"), btn = document.getElementById("btn"), err = document.getElementById("err");
    const next = new URLSearchParams(location.search).get("next") || "/";
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = ""; btn.disabled = true; btn.textContent = "Memeriksa…";
      try {
        const r = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: document.getElementById("u").value, password: document.getElementById("p").value }),
        });
        if (r.ok) { location.href = next; return; }
        const d = await r.json().catch(() => ({}));
        err.textContent = d.error || "Gagal masuk.";
      } catch (_) { err.textContent = "Tak bisa menghubungi server."; }
      btn.disabled = false; btn.textContent = "Masuk";
    });
  </script>
</body>
</html>
