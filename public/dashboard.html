<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Monitoring Dashboard</title>
  <meta name="description" content="Real-time hardware device monitoring dashboard — track network status, latency, and availability.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('dash-theme') || 'light');</script>
</head>
<body>

  <div class="header">
    <div>
      <h1>Device Monitoring</h1>
      <div class="meta" id="lastUpdate">Connecting...</div>
    </div>
    <span class="spacer"></span>
    <div class="conn-status">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Disconnected</span>
    </div>
    <select class="factory-select" id="filterFactory" title="Kelompokkan / pilih factory">
      <option value="ALL">Semua Factory</option>
    </select>
    <button class="theme-toggle" id="themeToggle" title="Tema terang / gelap">🌙</button>
    <button class="theme-toggle" id="logoutBtn" title="Keluar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><span class="summary-count" id="totalDevices" style="color:var(--accent)">0</span> Total</div>
    <div class="summary-item"><span class="summary-count" id="upCount" style="color:var(--up)">0</span> Up</div>
    <div class="summary-item"><span class="summary-count" id="downCount" style="color:var(--down)">0</span> Down</div>
    <div class="health-score">
      Health Score: <span class="score" id="healthScore" style="color:var(--up)">100%</span>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="filter-search-wrap">
      <input type="text" class="filter-search" id="filterSearch" placeholder="Search name or IP...">
    </div>
    <div class="filter-divider"></div>
    <div class="filter-pills" id="statusPills">
      <button class="filter-pill active" data-status="ALL">All</button>
      <button class="filter-pill" data-status="UP">● Up</button>
      <button class="filter-pill" data-status="DOWN">● Down</button>
    </div>
    <div class="filter-divider"></div>
    <select class="filter-select" id="filterSeverity">
      <option value="ALL">All Severity</option>
      <option value="CRITICAL">Critical</option>
      <option value="HIGH">High</option>
      <option value="MEDIUM">Medium</option>
      <option value="LOW">Low</option>
    </select>
    <select class="filter-select" id="filterSort">
      <option value="name">Sort: Name</option>
      <option value="status">Sort: Status</option>
      <option value="severity">Sort: Severity</option>
      <option value="latency">Sort: Latency</option>
      <option value="availability">Sort: Availability</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div id="deviceGrid"></div>

  <!-- FAB -->
  <button class="fab" id="fabAdd" title="Add Device">＋</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Device</h2>
      <label for="inputName">Device Name</label>
      <input type="text" id="inputName" placeholder="e.g. Server Rack A1">
      <label for="inputIp">IP Address</label>
      <input type="text" id="inputIp" placeholder="e.g. 192.168.1.10">
      <label for="inputSev">Severity</label>
      <select id="inputSev">
        <option value="CRITICAL">CRITICAL</option>
        <option value="HIGH">HIGH</option>
        <option value="MEDIUM" selected>MEDIUM</option>
        <option value="LOW">LOW</option>
      </select>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-primary" id="btnSubmit">Add Device</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-modal" id="detailModal"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
